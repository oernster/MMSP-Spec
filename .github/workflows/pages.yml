name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject spec into docs
        run: |
          printf -- '---\nlayout: default\ntitle: MMSP Specification — draft-mmsp-00\ndescription: Full text of the MultiMedia Subscription Protocol specification. Defines feed manifest schema, item types, source types, poll semantics, discovery, normalization, and filter grammar.\npermalink: /spec/\n---\n\n' \
            | cat - spec/draft-mmsp-00.md > docs/spec.md

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
