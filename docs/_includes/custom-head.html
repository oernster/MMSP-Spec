<style>
  /* Catppuccin Mocha dark override for minima 2.x */
  :root {
    --base:     #1e1e2e;
    --mantle:   #181825;
    --crust:    #11111b;
    --surface0: #313244;
    --surface1: #45475a;
    --subtext0: #a6adc8;
    --subtext1: #bac2de;
    --text:     #cdd6f4;
    --mauve:    #cba6f7;
    --blue:     #89b4fa;
    --green:    #a6e3a1;
    --peach:    #fab387;
  }

  body {
    background-color: var(--base) !important;
    color: var(--text) !important;
  }

  .site-header {
    background-color: var(--mantle) !important;
    border-top: 4px solid var(--mauve) !important;
    border-bottom: 1px solid var(--surface0) !important;
  }

  .site-title,
  .site-title:visited {
    color: var(--mauve) !important;
  }

  .site-nav .page-link {
    color: var(--subtext1) !important;
  }

  .site-nav .page-link:hover {
    color: var(--text) !important;
  }

  .site-footer {
    background-color: var(--mantle) !important;
    border-top: 1px solid var(--surface0) !important;
    color: var(--subtext0) !important;
  }

  .footer-heading,
  .contact-list,
  .social-media-list {
    color: var(--subtext0) !important;
  }

  .footer-col-wrapper {
    color: var(--subtext0) !important;
  }

  a {
    color: var(--blue) !important;
  }

  a:hover {
    color: var(--mauve) !important;
    text-decoration: underline;
  }

  .site-title:hover {
    text-decoration: none !important;
    color: var(--text) !important;
  }

  h1, h2, h3, h4, h5, h6 {
    color: var(--text) !important;
  }

  h1 { color: var(--mauve) !important; }

  hr {
    border-color: var(--surface0) !important;
  }

  code, pre {
    background-color: var(--crust) !important;
    color: var(--green) !important;
    border: 1px solid var(--surface0) !important;
    border-radius: 4px;
  }

  pre {
    padding: 1rem !important;
  }

  pre code {
    border: none !important;
  }

  blockquote {
    color: var(--subtext1) !important;
    border-left: 4px solid var(--mauve) !important;
    background: var(--mantle);
  }

  table {
    color: var(--text) !important;
  }

  table th {
    background-color: var(--surface0) !important;
    color: var(--text) !important;
    border: 1px solid var(--surface1) !important;
  }

  table td {
    background-color: var(--mantle) !important;
    border: 1px solid var(--surface0) !important;
  }

  table tr:nth-child(even) td {
    background-color: var(--crust) !important;
  }

  .page-content {
    background-color: var(--base) !important;
  }

  .post-link {
    color: var(--blue) !important;
  }

  .post-meta {
    color: var(--subtext0) !important;
  }

  strong {
    color: var(--text) !important;
  }

  .site-nav .nav-trigger ~ label {
    color: var(--subtext1) !important;
  }

  @media (max-width: 600px) {
    .site-nav {
      background-color: var(--mantle) !important;
      border: 1px solid var(--surface0) !important;
    }
  }
</style>
